name: release-please
on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.BOT_JACKSON_CLIENT_ID }}
          private-key: ${{ secrets.BOT_JACKSON_PRIVATE_KEY }}
      # Compute the calendar version: YYYY.M.MICRO, where MICRO is the next
      # release number within the current year/month (0 for the first).
      - id: calver
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          year="$(date -u +%Y)"
          month="$(date -u +%-m)"
          tags="$(gh api "repos/$REPO/tags" --paginate --jq '.[].name' || true)"
          max="$(printf '%s\n' "$tags" \
            | { grep -E "^v?${year}\.${month}\.[0-9]+$" || true; } \
            | sed -E "s/^v?${year}\.${month}\.//" | sort -n | tail -1)"
          if [ -z "$max" ]; then micro=0; else micro=$((max + 1)); fi
          version="${year}.${month}.${micro}"
          echo "Computed CalVer: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      # Simple (non-manifest) mode: release-as is honored here, whereas manifest
      # mode ignores it in favor of the manifest/config files.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: node
          release-as: ${{ steps.calver.outputs.version }}
