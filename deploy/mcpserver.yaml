apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: context8
  namespace: toolhive-system
spec:
  image: ghcr.io/OWNER/context8:latest
  transport: stdio
  proxyPort: 8080
  backendReplicas: 1   # REQUIRED: rotation accounting is per-process.
  secrets:
    - name: context8-api-keys
      key: api-keys
      targetEnvName: CONTEXT7_API_KEYS
